# ── Glossary ──────────────────────────────────────────────────────────────────
# category options: instrument, method, model, task, domain, contribution
glossary:
  REIMS:
    full: Rapid Evaporative Ionization Mass Spectrometry
    category: instrument
    definition: >
      A direct-to-analysis technique that allows near-instantaneous chemical analysis of a sample
      with minimal to no preparation. A heated blade vaporizes tissue, and the resulting aerosol is
      directed into a mass spectrometer, producing a chemical fingerprint in seconds.

  m/z:
    full: Mass-to-Charge Ratio
    category: instrument
    definition: >
      The x-axis of a mass spectrum, representing the ratio of an ion's mass to its charge.
      The REIMS dataset spans 2,080 distinct m/z features from approximately 77.04 to 999.32 m/z,
      each corresponding to a different molecular ion.

  TIC:
    full: Total Ion Current
    category: instrument
    definition: >
      The sum of all detected ion intensities across all m/z values in a single mass spectrum.
      TIC normalization divides each feature by the total ion current to remove inter-sample
      variation in overall signal intensity.

  OPLS-DA:
    full: Orthogonal Partial Least Squares Discriminant Analysis
    category: method
    definition: >
      A supervised chemometrics classification method that separates variation correlated with
      class labels (predictive) from orthogonal variation. Used as the primary baseline in this
      thesis, achieving up to 96% accuracy on species identification.

  Batch Detection:
    full: Batch Detection
    category: task
    definition: >
      The task of determining whether two fish samples originate from the same processing batch.
      Enables rapid recalls if contamination is discovered. Formulated as a pairwise classification
      task using contrastive learning in this thesis.

  Cross-species Adulteration:
    full: Cross-species Adulteration
    category: task
    definition: >
      Food fraud where a high-value fish species (Hoki) is mixed with a cheaper species (Mackerel).
      Formulated as a 3-class problem: pure Hoki, pure Mackerel, or a 50/50 mixture. Deep learning
      achieves 91.97% accuracy vs. 79.96% for OPLS-DA.

  Oil Contamination:
    full: Oil Contamination Detection
    category: task
    definition: >
      Detection and quantification of oil (e.g., engine or processing equipment oil) introduced
      into fish samples. Formulated as a 7-class ordinal classification problem with oil
      concentrations from 0% to 50% in 10% increments.

  Species Identification:
    full: Fish Species Identification
    category: task
    definition: >
      Classifying a REIMS spectrum to determine the fish species. A 2-class problem
      (Hoki vs. Mackerel) in this thesis, where MoE Transformer achieves 100% accuracy
      vs. 96.39% for OPLS-DA.

  Body Part Identification:
    full: Fish Body Part Identification
    category: task
    definition: >
      Classifying which anatomical body part a fish sample originates from (e.g., fillet, frame,
      offal). A multi-class problem where Ensemble Transformer achieves 74.13% accuracy vs.
      51.17% for OPLS-DA.

  Marine Biomass:
    full: Marine Biomass
    category: domain
    definition: >
      The total mass of all living marine organisms within a given area or ecosystem. In the
      context of this thesis, refers to the biological material (fish and shellfish) analyzed
      using REIMS for food quality and traceability applications.

  Transformer:
    full: Transformer Neural Network
    category: model
    definition: >
      A deep learning architecture based on self-attention mechanisms, introduced by Vaswani et al.
      (2017). Processes all elements of a sequence in parallel, capturing long-range dependencies.
      Applied to REIMS spectra as sequences of m/z values in this thesis.

  MoE:
    full: Mixture of Experts
    category: model
    definition: >
      A neural network architecture where multiple specialized sub-networks (experts) process
      different inputs, gated by a learned router. The MoE Transformer achieves 100% species
      identification accuracy by routing different spectral regions to specialized expert networks.

  SpectroSim:
    full: SpectroSim
    category: contribution
    definition: >
      A novel contrastive learning framework introduced in this thesis for label-free batch
      traceability. Uses a Transformer encoder within the SimCLR framework to learn pairwise
      similarity between mass spectra, achieving 70.8% batch detection accuracy without labeled data.

  MSM:
    full: Masked Spectra Modelling
    category: contribution
    definition: >
      A novel self-supervised pre-training technique introduced in this thesis, adapting BERT's
      masked language modeling to sequential REIMS data. Random m/z features are masked and the
      model learns to reconstruct them, providing a useful initialization for downstream tasks.

  Gone Phishing:
    full: Gone Phishing (MoE Transformer)
    category: contribution
    definition: >
      A novel Mixture of Experts (MoE) Transformer architecture introduced in this thesis for
      REIMS-based fish fraud detection — the name is a pun on fish and phishing. It replaces the
      standard feed-forward networks inside each Transformer encoder block with MoE layers: a
      learned gating mechanism routes each input token to the Top-k most relevant expert
      sub-networks, whose outputs are combined by a weighted sum. This allows the model to scale
      capacity without proportionally increasing compute. Achieves 100% accuracy on fish species
      identification.

  Autobots:
    full: Autobots (Multi-scale Ensemble Transformer)
    category: contribution
    definition: >
      A stacked voting ensemble of multi-scale Transformers introduced in this thesis — the name
      is a pun on the Autobots, a team of diverse Transformers. Three independent Transformer
      models with 2, 4, and 8 layers/heads respectively act as level-0 base classifiers analyzing
      the spectrum at low, medium, and high resolution. Their outputs are fed into a learned
      weighted combination meta-model (level-1) that optimally combines each model's predictions.
      Achieves 74.13% accuracy on fish body part identification.

  Ensemble Transformer:
    full: Ensemble Transformer
    category: model
    definition: >
      An architecture combining multiple Transformer models trained with different initializations
      or configurations. Achieves 74.13% body part identification accuracy by aggregating
      predictions from multiple specialized models.

  LIME:
    full: Local Interpretable Model-agnostic Explanations
    category: method
    definition: >
      An explainability technique that approximates any black-box model locally with an
      interpretable surrogate. Applied to REIMS models in this thesis to identify which m/z
      features most influence individual predictions.

  Grad-CAM:
    full: Gradient-weighted Class Activation Mapping
    category: method
    definition: >
      An explainability technique that uses gradients flowing into the final convolutional or
      attention layer to produce a saliency map. Applied to Transformer models in this thesis to
      visualize spectral regions important for classification.

  Transfer Learning:
    full: Transfer Learning
    category: method
    definition: >
      A machine learning approach where a model pre-trained on one task or dataset is fine-tuned
      on a different but related task. In this thesis, models trained on species identification
      are adapted to oil contamination detection, improving accuracy by up to 22.67%.

  Contrastive Learning:
    full: Contrastive Learning
    category: method
    definition: >
      A self-supervised learning paradigm that trains models to pull representations of similar
      samples together and push dissimilar samples apart. Used in SpectroSim for batch
      traceability without requiring labeled batch data.

  SimCLR:
    full: Simple Contrastive Learning of Representations
    category: method
    definition: >
      A contrastive learning framework by Chen et al. (2020) that learns representations by
      maximizing agreement between differently augmented views of the same sample. SpectroSim
      adapts this framework for mass spectra.

  BERT:
    full: Bidirectional Encoder Representations from Transformers
    category: model
    definition: >
      A pre-training language model using masked language modeling. Its masked-token objective
      inspired the Masked Spectra Modelling (MSM) technique in this thesis.

  Self-supervised Learning:
    full: Self-supervised Learning
    category: method
    definition: >
      A machine learning paradigm that generates supervisory signals from the data itself, without
      human-labeled annotations. Used in this thesis for MSM pre-training and SpectroSim
      contrastive learning on REIMS spectra.

  Hoki:
    full: "Hoki (Macruronus novaezelandiae)"
    category: domain
    definition: >
      A deep-sea fish species native to New Zealand waters, used as the high-value species in
      cross-species adulteration experiments. New Zealand is the world's largest exporter of Hoki,
      making it a target for seafood fraud.

  Mackerel:
    full: "Mackerel (Scomber japonicus)"
    category: domain
    definition: >
      A pelagic fish species used as the adulterant in cross-species adulteration experiments.
      Less expensive than Hoki but with a similar appearance when processed, making it a common
      seafood fraud target.

  Food Fraud:
    full: Food Fraud
    category: domain
    definition: >
      Deliberate adulteration, mislabeling, or misrepresentation of food products for economic
      gain. Seafood fraud is estimated to affect 30% of commercially sold seafood globally,
      driving the need for rapid verification tools like REIMS.

  Species Substitution:
    full: Species Substitution
    category: domain
    definition: >
      A form of food fraud where a premium fish species is replaced with a cheaper alternative.
      Detected in this thesis using REIMS-based classification, achieving up to 100% accuracy
      with Transformer models.

  IUU Fishing:
    full: Illegal, Unreported and Unregulated Fishing
    category: domain
    definition: >
      Fishing activities that contravene national and international laws, including fishing without
      authorization, under-reporting catches, and operating in restricted areas. REIMS-based
      species identification can help verify the provenance of seafood products.

  Chemical Fingerprint:
    full: Chemical Fingerprint
    category: instrument
    definition: >
      The characteristic pattern of molecular ions detected in a mass spectrum, unique to a given
      biological sample. REIMS produces chemical fingerprints of tissue that encode species, body
      part, and contamination information.

  Ordinal Classification:
    full: Ordinal Classification
    category: method
    definition: >
      Classification where the target classes have a natural ordering (e.g., 0%, 10%, 20% oil
      concentration). Standard classification ignores this ordering; ordinal methods exploit it.
      Used for oil contamination detection in this thesis.

  BCA:
    full: Balanced Classification Accuracy
    category: method
    definition: >
      An accuracy metric that averages per-class recall, compensating for class imbalance. Used
      as the primary evaluation metric in this thesis to fairly compare models across unbalanced
      datasets.

  MAE:
    full: Mean Absolute Error
    category: method
    definition: >
      The average absolute difference between predicted and true values. Used alongside BCA for
      ordinal classification tasks (oil contamination, adulteration) where the magnitude of
      classification error matters.

  Negative Ionization Mode:
    full: Negative Ionization Mode
    category: instrument
    definition: >
      A mass spectrometry acquisition mode in which negatively charged ions are detected. REIMS
      in negative ionization mode primarily detects lipid-related compounds (fatty acids,
      phospholipids) that form the chemical fingerprint of fish tissue.

  PCA:
    full: Principal Component Analysis
    category: method
    definition: >
      A linear dimensionality reduction technique that projects data onto axes of maximum
      variance. Used for visualization and as a preprocessing step, but outperformed by deep
      learning methods on REIMS classification tasks.

  SVM:
    full: Support Vector Machine
    category: model
    definition: >
      A supervised learning algorithm that finds the optimal hyperplane separating classes in a
      high-dimensional feature space. Used as a baseline classifier in this thesis.

  KNN:
    full: K-Nearest Neighbours
    category: model
    definition: >
      A non-parametric classification algorithm that assigns a label based on the majority class
      among the k nearest training samples. Used as a baseline classifier in this thesis.
